<!--
  Beme favicon — matches the brand mark used in the Header.
  Orange rounded square (brand colour) with a dark inset square cut from the
  middle. Scales from 16×16 favicon up to apple-touch-icon sizes without
  pixel artifacts.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect x="0" y="0" width="64" height="64" rx="12" ry="12" fill="#FF7A2D" />
  <rect x="12" y="12" width="40" height="40" rx="5" ry="5" fill="#0E0E10" />
</svg>
