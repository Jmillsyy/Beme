<!--
  Beme favicon - matches the BemeMark React component used in the app.
  Orange rounded square with a square HOLE cut from the middle (true
  transparency, not a dark inset) so the favicon reads the same on any
  browser tab colour. Single path with fill-rule="evenodd" subtracts
  the inner shape from the outer.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <path fill-rule="evenodd" clip-rule="evenodd" fill="#FF7A2D"
    d="M12 0 H52 A12 12 0 0 1 64 12 V52 A12 12 0 0 1 52 64 H12 A12 12 0 0 1 0 52 V12 A12 12 0 0 1 12 0 Z
       M17 12 A5 5 0 0 0 12 17 V47 A5 5 0 0 0 17 52 H47 A5 5 0 0 0 52 47 V17 A5 5 0 0 0 47 12 H17 Z"/>
</svg>
