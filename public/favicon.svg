<!--
  Beme favicon - the two-block brand mark (matches the BemeMark React
  component and the marketing site). Two rounded blocks with the centres
  cut clean through (fill-rule="evenodd" subtracts the holes) so they're
  genuinely transparent on any tab colour. The wide 104×56 mark is
  centred in a square viewBox (min-y -24) so it reads as a tab icon.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -24 104 104" width="104" height="104">
